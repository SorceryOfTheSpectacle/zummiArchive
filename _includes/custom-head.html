<style>
  /* Block permalink anchors (§ N) */
  .block-ref {
    font-size: 0.65em;
    color: #ccc;
    text-decoration: none;
    font-family: monospace;
    margin-right: 0.2em;
    vertical-align: middle;
    user-select: none;
  }
  .block-ref:hover { color: #888; }

  /* Thematic tag chips */
  .tag-chip {
    display: inline-block;
    font-size: 0.58em;
    font-family: monospace;
    border-radius: 3px;
    padding: 1px 5px;
    margin-right: 3px;
    vertical-align: middle;
    white-space: nowrap;
    user-select: none;
    line-height: 1.7;
    opacity: 0.7;
  }
  .tag-chip:hover { opacity: 1; }
  .tc-spectacle { background: #fde8e8; color: #8b1a1a; }
  .tc-alphabet  { background: #e8f4f8; color: #1a4d6b; }
  .tc-occult    { background: #f0e8f8; color: #5a1a8b; }
  .tc-cyber     { background: #e8f8ec; color: #1a6b2e; }
  .tc-plato     { background: #e8eef8; color: #1a2d6b; }
  .tc-critical  { background: #fef0e6; color: #8b3a1a; }
  .tc-media     { background: #e6f8f8; color: #1a5a5a; }
  .tc-myth      { background: #fef8e6; color: #6b4a1a; }
  .tc-meta      { background: #f0f0f0; color: #4a4a4a; }

  /* Wayback Machine companion links */
  .wayback-link {
    font-size: 0.65em;
    color: #aaa;
    text-decoration: none;
    margin-left: 3px;
    font-family: monospace;
    white-space: nowrap;
  }
  .wayback-link::before { content: '['; }
  .wayback-link::after  { content: ']'; }
  .wayback-link:hover   { color: #555; text-decoration: underline; }
</style>

<script defer>
(function () {
  // Domains that are stable or where Wayback adds no value
  var SKIP = [
    'web.archive.org',
    'reddit.com',
    'github.com',
    'youtube.com',
    'youtu.be',
    'sorceryofthespectacle.github.io',
  ];

  document.addEventListener('DOMContentLoaded', function () {
    var content = document.querySelector('article') ||
                  document.querySelector('.post-content') ||
                  document.querySelector('main');
    if (!content) return;

    content.querySelectorAll('a[href^="http"]').forEach(function (link) {
      try {
        var host = new URL(link.href).hostname;
        if (SKIP.some(function (d) { return host === d || host.endsWith('.' + d); })) return;
        // Skip if we already added one (idempotent)
        if (link.nextSibling && link.nextSibling.classList &&
            link.nextSibling.classList.contains('wayback-link')) return;

        var a = document.createElement('a');
        a.href = 'https://web.archive.org/web/*/' + link.href;
        a.textContent = 'archived';
        a.className = 'wayback-link';
        a.title = 'View captures of this URL on the Wayback Machine';
        a.target = '_blank';
        a.rel = 'noopener noreferrer';
        link.insertAdjacentElement('afterend', a);
      } catch (e) {}
    });
  });
}());
</script>
